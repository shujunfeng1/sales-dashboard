name: Build Installers

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: Windows
          - os: macos-latest
            platform: mac
            artifact: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

      - name: Build ${{ matrix.artifact }} installer
        run: |
          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            npx electron-builder --${{ matrix.platform }} --x64 \
              --config.mac.certificateFile="" \
              --config.mac.identity=null
          else
            npx electron-builder --${{ matrix.platform }} --x64
          fi

      - name: Upload ${{ matrix.artifact }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-installer
          path: |
            release/**/*.exe
            release/**/*.dmg
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: Windows-installer
          path: win      - name: Download macOS
        uses: actions/download-artifact@v4
        with:
          name: macOS-installer
          path: mac

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            win/*.exe
            mac/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
